# Kalshi weather bot config
# Cities are the most liquid Kalshi temperature markets (KXHIGH* series)
cities:
  NY:
    name: New York
    station: KNYC          # Central Park, NWS settlement station
    lat: 40.7794
    lon: -73.9692
    kalshi_series: KXHIGHNY
  CHI:
    name: Chicago
    station: KORD
    lat: 41.9742
    lon: -87.9073
    kalshi_series: KXHIGHCHI
  LAX:
    name: Los Angeles
    station: KLAX
    lat: 33.9425
    lon: -118.4081
    kalshi_series: KXHIGHLAX
  MIA:
    name: Miami
    station: KMIA
    lat: 25.7932
    lon: -80.2906
    kalshi_series: KXHIGHMIA
  AUS:
    name: Austin
    station: KAUS
    lat: 30.1944
    lon: -97.6700
    kalshi_series: KXHIGHAUS

backtest:
  lookback_days: 365
  min_edge: 0.10          # tightened after $42 loss; only fire on obvious mispricings
  longshot_floor_cents: 15 # raised floor (sub-15c bets are lottery tickets)
  taker_fee_mult: 0.07
  maker_fee_mult: 0.0175
  assumed_spread_cents: 2
  bankroll: 50
  per_pos_pct: 0.08       # was 0.20, now 8% per position
  max_exposure_pct: 0.50  # was 0.95, now 50% so bot never deploys all cash
  daily_loss_pct: 0.20    # was 0.40, now 20% (any 20% red day pauses)
  kelly_fraction: 0.15    # was 0.50, now tenth-ish-Kelly
  cancel_stale_hours: 16
