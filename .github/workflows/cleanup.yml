name: post-settle-cleanup

# 15:00 UTC = 11am ET. After morning settlement, cancel any leftover
# unfilled resting orders for past dates.
on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    env:
      KALSHI_ENV: prod
      KALSHI_API_KEY_ID: ${{ secrets.KALSHI_PROD_API_KEY_ID }}
      KALSHI_PRIVATE_KEY_PATH: /tmp/kalshi_prod.pem
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: |
          umask 077
          printf '%s' "${{ secrets.KALSHI_PROD_PRIVATE_KEY_PEM }}" > /tmp/kalshi_prod.pem
      - run: python runners/post_settle_cleanup.py
      - if: always()
        run: rm -f /tmp/kalshi_prod.pem
